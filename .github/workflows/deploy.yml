name: CI/CD Pipeline PMSI Dagster

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v3

      - name: Se connecter a Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construire l image Docker
        run: docker build -t octa425/pmsi-dagster:latest .

      - name: Pousser sur Docker Hub
        run: docker push octa425/pmsi-dagster:latest
